x-volumes: &volumes
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - /etc/localtime:/etc/localtime:ro
  - /dev/dri:/dev/dri
  # Mount local src — changes reflect immediately without rebuild
  - ./src:/patrick_ws/src
  # Mount entrypoint to allow changes without rebuild
  - ./entrypoint.sh:/entrypoint.sh

x-environment: &environment
  - DISPLAY
  - NVIDIA_VISIBLE_DEVICES=all
  - NVIDIA_DRIVER_CAPABILITIES=all
  - QT_X11_NO_MITSHM=1

x-common: &common
  image: patrick:latest
  network_mode: host
  privileged: true
  ipc: host
  stdin_open: true
  tty: true

# ════════════════════════════════════════════════════════════════════════════

services:
  # ── Full simulation (Gazebo + controllers + RViz) via patrick_bringup ──
  patrick-simulation:
    container_name: patrick-simulation
    command: bash -c "ros2 launch patrick_main patrick_bringup.launch.py simulation:=true"
    <<: *common
    environment: *environment
    volumes: *volumes

  patrick-hardware:
    container_name: patrick-hardware
    command: bash -c "ros2 launch patrick_main patrick_bringup.launch.py simulation:=false"
    <<: *common
    environment: *environment
    volumes: *volumes
    
