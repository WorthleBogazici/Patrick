# =============================================================================
# Patrick MoveIt2 — Controllers Bridge (REAL HARDWARE)
# =============================================================================
# Same semantics as moveit_controllers.yaml but points at the
# ScaledJointTrajectoryController (ur_controllers) which is loaded under
# the name `scaled_arm_controller` on real hardware. See
# patrick_main/config/patrick_controllers.yaml.
# =============================================================================

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - scaled_arm_controller
    - gripper_controller

  scaled_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4

  gripper_controller:
    type: GripperCommand
    action_ns: gripper_cmd
    default: true
    joints:
      - Joint5R

trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.05
