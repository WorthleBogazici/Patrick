# =============================================================================
# Patrick Robot — ros2_control Controllers (ROS 2 Jazzy)
# =============================================================================
# Controllers loaded by the controller_manager at runtime.
#
#   Sim  : arm_controller       (joint_trajectory_controller)
#   Real : scaled_arm_controller (ur_controllers/ScaledJointTrajectoryController)
#   Both : joint_state_broadcaster, diff_drive_controller, gripper_controller
#
# MoveIt drives "arm_controller/follow_joint_trajectory" on both backends —
# in real-HW mode the launch file remaps scaled_arm_controller's action
# namespace to arm_controller so MoveIt's moveit_controllers.yaml stays
# identical for sim and hardware.
# =============================================================================

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    # Simulation arm controller (position-commanded JTC)
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Real-hardware arm controller (position-commanded, speed-scaled JTC)
    scaled_arm_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    # Gripper (single driving joint; Joint5L mimics Joint5R via URDF)
    # Uses the classic position_controllers/GripperActionController so that
    # MoveIt's simple_controller_manager (GripperCommand action) works.
    gripper_controller:
      type: position_controllers/GripperActionController

# =============================================================================
# Joint State Broadcaster
# =============================================================================
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

# =============================================================================
# Diff Drive Controller (Kobuki base) — simulation only
# =============================================================================
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["wheel_left_joint"]
    right_wheel_names: ["wheel_right_joint"]

    wheel_separation: 0.230
    wheel_radius: 0.035

    odom_frame_id: odom
    base_frame_id: base_footprint
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    enable_odom_tf: true

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.65
    linear.x.min_velocity: -0.65
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 1.0
    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 3.14
    angular.z.min_velocity: -3.14
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 3.0

    cmd_vel_timeout: 0.5

# =============================================================================
# Arm Trajectory Controller — simulation (JTC)
# =============================================================================
arm_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.5
      Joint1: { trajectory: 0.1, goal: 0.05 }
      Joint2: { trajectory: 0.1, goal: 0.05 }
      Joint3: { trajectory: 0.1, goal: 0.05 }
      Joint4: { trajectory: 0.1, goal: 0.05 }

# =============================================================================
# Arm Trajectory Controller — real hardware (Scaled JTC)
# =============================================================================
# Identical joint set / interfaces as arm_controller, plus a speed-scaling
# state input from the hardware GPIO. The launch file remaps the FJT action
# namespace to /arm_controller/follow_joint_trajectory so MoveIt doesn't care
# which variant is active.
scaled_arm_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: speed_scaling/speed_scaling_factor
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.5
      Joint1: { trajectory: 0.1, goal: 0.05 }
      Joint2: { trajectory: 0.1, goal: 0.05 }
      Joint3: { trajectory: 0.1, goal: 0.05 }
      Joint4: { trajectory: 0.1, goal: 0.05 }

# =============================================================================
# Gripper Controller
# =============================================================================
# Single-DOF gripper driver. Joint5R is commanded; Joint5L is a URDF mimic
# joint that follows automatically via gz_ros2_control (sim) or the Arduino
# hardware interface (real).  Exposes control_msgs/action/GripperCommand on
# /gripper_controller/gripper_cmd (this is what MoveIt's simple controller
# manager expects).
gripper_controller:
  ros__parameters:
    joint: Joint5R
    max_effort: 50.0
    # Loose tolerance: jaws stall on the object before hitting the commanded
    # position, so we accept +-2° of error (0.035 rad) as "reached".
    goal_tolerance: 0.035
    action_monitor_rate: 20.0
    allow_stalling: true
    stall_timeout: 1.5
    stall_velocity_threshold: 0.01
