# =============================================================================
# Patrick Robot — Unified Configuration (ROS 2 Jazzy)
# =============================================================================
# All parameters for the Patrick robot in a single config file.
# Loaded by the bringup launch; individual nodes use their namespace section.
# =============================================================================

# ─── ros2_control Controller Manager ────────────────────────────────────────
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Controllers to load
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# ─── Joint State Broadcaster ────────────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

# ─── Diff Drive Controller (Kobuki base) ────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["wheel_left_joint"]
    right_wheel_names: ["wheel_right_joint"]

    wheel_separation: 0.230
    wheel_radius: 0.035

    # Odometry
    odom_frame_id: odom
    base_frame_id: base_footprint
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    enable_odom_tf: true

    # Velocity limits
    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.65
    linear.x.min_velocity: -0.65
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 1.0
    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 3.14
    angular.z.min_velocity: -3.14
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 3.0

    # Command timeout
    cmd_vel_timeout: 0.5

# ─── Arm Trajectory Controller ──────────────────────────────────────────────
arm_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5R
      - Joint5L
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      Joint1: {p: 100.0, i: 1.0, d: 0.0}
      Joint2: {p: 100.0, i: 1.0, d: 0.0}
      Joint3: {p: 100.0, i: 1.0, d: 0.0}
      Joint4: {p: 1.0, i: 0.0, d: 0.0}
      Joint5R: {p: 0.5, i: 0.0, d: 0.0}
      Joint5L: {p: 0.5, i: 0.0, d: 0.0}
